name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_VERSION: "1.94.1"

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component rustfmt
          rustup default ${{ env.RUST_VERSION }}
      - run: cargo fmt --all -- --check
        working-directory: core

  clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto uuid-dev libbsd-dev
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component clippy,rustfmt
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: core

  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto uuid-dev libbsd-dev
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component rustfmt
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo test --all
        working-directory: core

  release:
    name: cargo build --release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto uuid-dev libbsd-dev
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component rustfmt
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - run: cargo build --release
        working-directory: core

  tui:
    name: tui fmt + clippy + build + test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto uuid-dev libbsd-dev
      - name: Install Rust
        run: |
          rustup toolchain install ${{ env.RUST_VERSION }} --profile minimal --component clippy,rustfmt
          rustup default ${{ env.RUST_VERSION }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui
      - run: cargo fmt --all -- --check
        working-directory: tui
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: tui
      - run: cargo test
        working-directory: tui
      - run: cargo build --release
        working-directory: tui

  sidecar:
    name: sidecar build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev cmake-format clang-format
      - name: cmake-format check
        run: cmake-format --check sidecar/concords/CMakeLists.txt
      - name: clang-format check
        run: clang-format --dry-run --Werror sidecar/concords/src/*.cpp sidecar/concords/src/*.h sidecar/concords/tests/*.cpp
      - name: Build + test
        run: |
          cmake -S sidecar/concords -B sidecar/concords/build -DCMAKE_BUILD_TYPE=Release
          cmake --build sidecar/concords/build -j
          ctest --test-dir sidecar/concords/build --output-on-failure

  exec:
    name: exec build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq capnproto libcapnp-dev libcurl4-openssl-dev cmake-format clang-format
      - name: cmake-format check
        run: cmake-format --check exec/scenario/CMakeLists.txt
      - name: clang-format check
        run: clang-format --dry-run --Werror exec/scenario/src/*/*.h exec/scenario/src/*/*.cpp exec/scenario/tests/*.cpp
      - name: Build + test
        run: |
          cmake -S exec/scenario -B exec/scenario/build -DCMAKE_BUILD_TYPE=Release
          cmake --build exec/scenario/build -j
          ctest --test-dir exec/scenario/build --output-on-failure
