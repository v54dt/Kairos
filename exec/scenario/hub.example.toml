# Kairos order hub config template — copy to hub.toml, fill creds, run:
#   kairos_order_hubd hub.toml
# One hub per broker account serves all scenarios (one concords connection + one
# 1 req/s gate). Scenarios connect over UDS and carry no creds.

[user]
user_id = ""
password = ""
account = ""
pfx_filepath = ""   # absolute path recommended (resolved from the hub's CWD)
pfx_password = ""

# [hub]
# socket_path = ""   # order UDS path. Omit to auto-resolve (same as scenarios):
#                    #   $KAIROS_ORDER_SOCK, else $XDG_RUNTIME_DIR, else
#                    #   /run/user/<uid>/kairos-orders.sock.  Never /tmp.

# [risk]
# Account risk gate. It sits in the hub and enforces ACROSS all scenario clients
# on this one shared account. A submit that trips a limit is rejected with an ack
# ok=false (the trader sees a normal ack failure); cancels are never blocked.
# TWD notional caps count realized (filled today) + open (reserved) + the new
# order. 0 or absent = that check is disabled.
# max_account_notional_twd = 0            # whole-account cap: day-realized + open + new
# max_open_orders_per_client = 0          # per-scenario live-order count cap
# max_open_notional_per_client_twd = 0    # per-scenario open-notional cap
# self_match_protection = true            # reject a submit that would cross this account's
#                                         # own open opposite-side order (證交法 155-1-5)
#
# Fat-finger pre-trade guards (SEC 15c3-5 style). Counts/ms/percent, not TWD.
# Each 0/absent = that guard disabled; with all three 0 the gate is unchanged.
# max_order_shares = 0                     # (c) per-submit share/lot hard cap
# dup_order_window_ms = 0                   # (b) reject an identical (symbol,side,shares,price)
#                                          # resubmit within this window (suspected runaway loop);
#                                          # measured on a monotonic clock, account-wide
#
# Admin halt kill switch (no config key): create the sentinel file
#   $KAIROS_HUB_HALT, else $XDG_RUNTIME_DIR/kairos-hub-halt
# to reject all new submits immediately; unlink it to resume. Cancels keep
# flowing while halted so an operator can flatten. The halt state is shown in
# the hub status file (kairos-hub-status.json, "halted") for the TUI.
