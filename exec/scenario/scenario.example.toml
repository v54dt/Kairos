# Kairos scenario (劇本) template — copy and run. Broker creds live in the order
# hub config (hub.toml), not here; --live connects to kairos_order_hubd over UDS.

[scenario]
name = "2330-accumulate"
symbol = "2330"
market = "TSE"
board = "OddLot"
side = "Buy"
product = "stock"
funding_type = "Cash"
time_in_force = "ROD"
budget_twd = 300000
shares_per_order = 0
pacing = "twap"

[fees]
base_rate = 0.001425
discount = 1.0
min_fee_oddlot = 1
min_fee_roundlot = 20
sell_tax_rate = 0.003
daytrade_tax_rate = 0.0015
max_order_value_twd = 0

[pricing]
policy = "cross"
tick_offset = 0
peg_level = 1   # join only: 1 = best, 2 = 1 tick deeper, ...
reference_price = 0.0
max_deviation_pct = 9.0
use_trial_quotes = false

[window]
start_time = "09:10"
end_time = "13:25"
weekdays_only = true

[reconnect]
daily_at = "07:05"

[risk]
max_orders = 0
max_open_orders = 0
max_notional_twd = 0
require_two_sided = true
quote_max_age_ms = 5000
quote_stall_alert_ms = 30000
stop_on_disconnect = true

[mode]
live = false

[notify]
enabled = false
base_url = ""
topic = ""
token = ""
min_severity = "info"
rate_capacity = 250
rate_refill_per_h = 20.0

[dashboard]
enabled = false
api_url = ""
broker_name = "scenario-trader"
