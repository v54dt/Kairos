# Kairos scenario (劇本) template — copy and run. Broker creds live in the order
# hub config (hub.toml), not here; --live connects to kairos_order_hubd over UDS.
#
# Sockets are auto-resolved (no config needed): quotes from
#   $KAIROS_QUOTE_SOCK, else $XDG_RUNTIME_DIR/.., else /run/user/<uid>/kairos-quotes.sock;
# orders to the hub via the same rule with kairos-orders.sock ($KAIROS_ORDER_SOCK).
# Set those env vars only to override. Never /tmp (world-writable). core, sidecar,
# the hub and scenarios must all agree, so override them together.
#
# Optional: inherit shared defaults (fees/window/notify/…) from a common file and
# override only what differs here. Path is relative to this file; one level deep.
#   base = "base.toml"

[scenario]
name = "2330-accumulate"
symbol = "2330"
market = "TSE"
board = "OddLot"
side = "Buy"
product = "stock"
funding_type = "Cash"
time_in_force = "ROD"
budget_twd = 300000
shares_per_order = 0
pacing = "twap"

[fees]
base_rate = 0.001425
discount = 1.0
min_fee_oddlot = 1
min_fee_roundlot = 20
sell_tax_rate = 0.003
daytrade_tax_rate = 0.0015
max_order_value_twd = 0

[pricing]
policy = "cross"
tick_offset = 0
peg_level = 1   # join only: 1 = best, 2 = 1 tick deeper, ...
reference_price = 0.0
max_deviation_pct = 9.0
use_trial_quotes = false

[window]
start_time = "09:10"
end_time = "13:25"
weekdays_only = true

[journal]
# Run-state journal dir: on restart, same-day fills are replayed so accounting is
# restored and the budget isn't re-bought. Empty = off in paper; a live run with an
# empty dir defaults to <data-dir>/journal (~/Kairos/data/journal). Use an absolute
# path (e.g. /home/you/Kairos/data/journal) so it lands under the gitignored data/.
dir = ""

[risk]
require_two_sided = true
quote_max_age_ms = 5000
quote_stall_alert_ms = 30000
ack_timeout_ms = 3000
stop_on_disconnect = true

[mode]
live = false

[notify]
enabled = false
base_url = ""
topic = ""
token = ""
min_severity = "info"
rate_capacity = 250
rate_refill_per_h = 20.0

[dashboard]
enabled = false
api_url = ""
broker_name = "scenario-trader"
